<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entrar ‹ Super Podcast CMS — WordPress Style</title>
    <style>
        :root {
            --wp-blue: #2271b1;
            --wp-bg: #f0f2f5;
        }

        body {
            background-color: var(--wp-bg);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen-Sans, Ubuntu, Cantarell, "Helvetica Neue", sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        .login-wrapper {
            width: 320px;
            padding: 20px;
        }

        .login-logo {
            text-align: center;
            margin-bottom: 25px;
        }

        .login-logo h1 {
            font-size: 5rem;
            margin: 0;
            color: #1d2327;
        }

        .login-box {
            background: #fff;
            padding: 26px 24px 34px;
            box-shadow: 0 1px 3px rgba(0, 0, 0, .04);
            border: 1px solid #c3c4c7;
        }

        .form-group {
            margin-bottom: 16px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-size: 14px;
            color: #1d2327;
        }

        input {
            width: 100%;
            padding: 8px;
            font-size: 24px;
            border: 1px solid #8c8f94;
            box-sizing: border-box;
            outline: none;
        }

        input:focus {
            border-color: var(--wp-blue);
            box-shadow: 0 0 0 1px var(--wp-blue);
        }

        .btn-submit {
            background: var(--wp-blue);
            color: white;
            border: none;
            padding: 10px 15px;
            font-size: 14px;
            border-radius: 3px;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
            font-weight: 500;
        }

        .btn-submit:hover {
            background: #135e96;
        }

        .login-footer {
            margin-top: 20px;
            font-size: 13px;
            text-align: center;
        }

        .login-footer a {
            color: #3c434a;
            text-decoration: none;
        }

        .login-footer a:hover {
            color: var(--wp-blue);
        }

        @keyframes shake {
            0% {
                transform: translateX(0);
            }

            25% {
                transform: translateX(5px);
            }

            50% {
                transform: translateX(-5px);
            }

            75% {
                transform: translateX(5px);
            }

            100% {
                transform: translateX(0);
            }
        }
    </style>
</head>

<body>

    <div class="login-wrapper">
        <div class="login-logo">
            <h1>🎙️</h1>
            <p style="font-weight: bold; color: #1d2327;">Super Podcast CMS</p>
        </div>

        <div class="login-box">
            <div id="login-error"
                style="display:none; background: #fff; border-left: 4px solid #d63638; box-shadow: 0 1px 1px 0 rgba(0,0,0,.1); margin: 0 0 16px; padding: 12px; font-size: 14px; color: #1d2327;">
                <strong>ERRO</strong>: Usuário ou senha incorretos.
            </div>

            <form id="login-form">
                <div class="form-group">
                    <label for="user">Usuário</label>
                    <input type="text" id="user" placeholder="admin" spellcheck="false" autocomplete="username"
                        autofocus>
                </div>

                <div class="form-group" style="position: relative;">
                    <label for="pass">Senha</label>
                    <input type="password" id="pass" placeholder="Sua senha" autocomplete="current-password">
                    <span onclick="togglePass()"
                        style="position: absolute; right: 10px; bottom: 8px; cursor: pointer; opacity: 0.5;">👁️</span>
                </div>

                <button type="submit" class="btn-submit">Acessar</button>

                <div style="margin-top: 25px; border-top: 1px dashed #ddd; padding-top: 15px; text-align: center;">
                    <p style="font-size: 10px; color: #999; margin-bottom: 10px;">Atalhos para desenvolvimento:</p>
                    <div style="display: flex; gap: 8px;">
                        <button type="button" onclick="fillAdmin()"
                            style="flex:1; background: #f0f0f0; border: 1px solid #ccc; color: #333; font-size: 10px; padding: 6px; border-radius: 3px; cursor: pointer;">Preencher
                            Admin</button>
                        <button type="button" onclick="autoLogin()"
                            style="flex:1; background: #f0f0f0; border: 1px solid #ccc; color: #333; font-size: 10px; padding: 6px; border-radius: 3px; cursor: pointer;">Acesso
                            Direto</button>
                    </div>
                </div>
            </form>
        </div>

        <div class="login-footer">
            <a href="../index.html">← Voltar para o site</a>
            <p style="font-size: 10px; opacity: 0.3; margin-top: 10px;">v4.0 Final Security</p>
        </div>
    </div>

    <script>
        document.getElementById('login-form').onsubmit = function (e) {
            e.preventDefault();
            const u = document.getElementById('user').value.toLowerCase().trim();
            const p = document.getElementById('pass').value.trim();
            const errorDiv = document.getElementById('login-error');

            console.log('Login attempt:', u, p);

            if (u === 'admin' && p === 'senha') {
                errorDiv.style.display = 'none';
                localStorage.setItem('isLoggedIn', 'true');
                console.log('Login success, redirecting...');
                setTimeout(() => { window.location.href = 'dashboard.html'; }, 100);
            } else {
                errorDiv.style.display = 'block';
                const box = document.querySelector('.login-box');
                box.style.animation = 'shake 0.2s 3';
                setTimeout(() => box.style.animation = '', 600);
            }
        };

        function fillAdmin() {
            document.getElementById('user').value = 'admin';
            document.getElementById('pass').value = 'senha';
        }

        function autoLogin() {
            localStorage.setItem('isLoggedIn', 'true');
            window.location.href = 'dashboard.html';
        }

        function togglePass() {
            const p = document.getElementById('pass');
            p.type = p.type === 'password' ? 'text' : 'password';
        }

        // Auto-check session
        if (localStorage.getItem('isLoggedIn') === 'true') {
            window.location.href = 'dashboard.html';
        }
    </script>
</body>

</html>
