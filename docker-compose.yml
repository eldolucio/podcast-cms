version: '3.8'

services:
  db:
    image: mariadb:10.6
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: wp_clone_db
      MYSQL_USER: wp_user
      MYSQL_PASSWORD: password
    volumes:
      - db_data:/var/lib/mysql
    ports:
      - "3306:3306"

  wp_bridge:
    image: wordpress:php8.3-apache
    restart: always
    ports:
      - "8080:80"
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_USER: wp_user
      WORDPRESS_DB_PASSWORD: password
      WORDPRESS_DB_NAME: wp_clone_db
    depends_on:
      - db
    volumes:
      - ./wp-plugins:/var/www/html/wp-content/plugins
      - ./wp-themes:/var/www/html/wp-content/themes
      - ./public/uploads:/var/www/html/wp-content/uploads
      - ./src/lib/shadow-engine/wp-bridge.php:/var/www/html/wp-bridge.php
      - ./src/lib/shadow-engine/wp-config-override.php:/var/www/html/wp-config-override.php

  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "mysql://wp_user:password@db:3306/wp_clone_db"
      DB_HOST: db
      DB_USER: wp_user
      DB_PASSWORD: password
      DB_NAME: wp_clone_db
    depends_on:
      - db
    # We will mount the current directory into the container to allow live reloading and local development
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    command: npm run dev

volumes:
  db_data:
