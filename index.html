<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="site-title">Podcast Site</title>
    <meta id="site-desc" name="description" content="">
    <link rel="stylesheet" href="src/super-style.css">
    <style>
        body {
            background-color: var(--site-bg);
            color: var(--site-text);
            transition: all 0.5s ease;
            min-height: 100vh;
            margin: 0;
            padding-bottom: 100px;
        }

        .public-hero {
            padding: 80px 20px;
            text-align: center;
            background: var(--site-accent);
            color: white;
        }

        .public-container {
            max-width: 900px;
            margin: -50px auto 0;
            padding: 0 20px;
        }

        .public-card {
            background: var(--site-card);
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            margin-bottom: 30px;
            border: 1px solid rgba(0, 0, 0, 0.05);
        }

        .public-tag {
            background: var(--site-accent);
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: bold;
            text-transform: uppercase;
        }

        .public-meta {
            font-size: 0.9rem;
            opacity: 0.7;
            margin: 15px 0;
            display: flex;
            gap: 20px;
        }

        .public-content {
            line-height: 1.8;
            font-size: 1.1rem;
        }

        .public-content img {
            max-width: 100%;
            border-radius: 8px;
        }

        .admin-link {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: var(--site-accent);
            color: white;
            padding: 12px 25px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
            z-index: 1000;
        }
    </style>
</head>

<body class="theme-default">

    <header class="public-hero">
        <h1 id="hero-title" style="font-size: 3.5rem; margin-bottom: 0;">Nome do Podcast</h1>
        <p id="hero-subtitle" style="font-size: 1.2rem; opacity: 0.9; margin-top: 10px;">Descrição do site carregada via
            CMS</p>

        <div style="margin-top: 40px; display: flex; justify-content: center; gap: 10px; flex-wrap: wrap;">
            <input type="text" id="site-search" class="search-box" placeholder="🔍 Buscar episódios..."
                oninput="filterEpisodes()">
        </div>
    </header>

    <main class="public-container">
        <!-- Filters -->
        <div class="filter-wrap" id="public-filters">
            <span class="filter-tag active" onclick="filterByCategory('all')">Todos</span>
        </div>

        <!-- Episodes List -->
        <div id="episodes-list">
            <!-- Rendered by JS -->
        </div>

        <!-- Featured Guests Section -->
        <section style="margin-top: 60px;">
            <h2 style="text-align: center; margin-bottom: 30px;">👥 Convidados de Destaque</h2>
            <div class="guest-grid" id="public-guests"></div>
        </section>

        <!-- Subscriber / Newsletter Form -->
        <section class="public-card"
            style="margin-top: 60px; background: var(--site-accent); color: white; text-align: center;">
            <h3>📬 Receba os novos episódios</h3>
            <p>Deixe seu e-mail e seja avisado assim que um novo episódio sair!</p>
            <div style="margin-top: 20px; display: flex; gap: 10px; justify-content: center;">
                <input type="email" id="sub-email" class="form-input" placeholder="seu@email.com"
                    style="width: 300px; padding: 12px; border-radius: 4px; border: none;">
                <button class="btn-action"
                    style="background: white; color: var(--site-accent); border: none; padding: 12px 25px; border-radius: 4px; font-weight: bold; cursor: pointer;"
                    onclick="subscribeNewsletter()">Inscrever</button>
            </div>
        </section>
    </main>

    <a href="admin.html" class="admin-link">Painel do Podcaster ⚙️</a>

    <script>
        const Database = {
            episodes: () => JSON.parse(localStorage.getItem('super_cms_episodes')) || [],
            guests: () => JSON.parse(localStorage.getItem('super_cms_guests')) || [],
            settings: () => JSON.parse(localStorage.getItem('super_cms_settings')) || { theme: 'theme-default', seoTitle: 'Podcast Premium', seoDesc: 'Bem-vindo.' },
            player: () => JSON.parse(localStorage.getItem('super_cms_player')) || { bg: '#1d2327', accent: '#2271b1', radius: '12' }
        };

        let currentCategory = 'all';

        function initSite() {
            const s = Database.settings();
            document.body.className = s.theme;
            document.title = s.seoTitle;
            document.getElementById('hero-title').innerText = s.seoTitle;
            document.getElementById('hero-subtitle').innerText = s.seoDesc;

            const p = Database.player();
            document.documentElement.style.setProperty('--player-bg', p.bg);
            document.documentElement.style.setProperty('--player-accent', p.accent);
            document.documentElement.style.setProperty('--player-radius', p.radius + 'px');

            renderFilters();
            renderEpisodes();
            renderGuests();
        }

        function renderFilters() {
            const episodes = Database.episodes();
            const cats = [...new Set(episodes.map(e => e.category))];
            const filterContainer = document.getElementById('public-filters');

            filterContainer.innerHTML = `<span class="filter-tag ${currentCategory === 'all' ? 'active' : ''}" onclick="filterByCategory('all')">Todos</span>` +
                cats.map(c => `<span class="filter-tag ${currentCategory === c ? 'active' : ''}" onclick="filterByCategory('${c}')">${c}</span>`).join('');
        }

        function renderEpisodes() {
            const list = document.getElementById('episodes-list');
            const search = document.getElementById('site-search').value.toLowerCase();
            const episodes = Database.episodes().filter(ep => {
                const matchesCat = currentCategory === 'all' || ep.category === currentCategory;
                const matchesSearch = ep.title.toLowerCase().includes(search) || ep.content.toLowerCase().includes(search);
                const isPublished = ep.status !== 'draft';
                // Scheduling logic: simple check for now
                const isReleased = !ep.schedule || new Date(ep.schedule) <= new Date();
                return matchesCat && matchesSearch && isPublished && isReleased;
            });

            if (episodes.length === 0) {
                list.innerHTML = '<div class="public-card text-center">Nenhum episódio encontrado.</div>';
                return;
            }

            list.innerHTML = episodes.map(ep => `
                <article class="public-card">
                    <span class="public-tag">${ep.category}</span>
                    <h2 style="margin: 20px 0 5px; font-size: 2rem;">${ep.title}</h2>
                    <div class="public-meta">
                        <span>📅 ${new Date(ep.id).toLocaleDateString()}</span>
                        <span>⏱️ ${ep.duration}</span>
                        ${ep.guest ? `<span>👤 Convidado: ${ep.guest}</span>` : ''}
                    </div>
                    <div class="public-content">${ep.content}</div>
                    
                    <!-- Professional Waveform Player -->
                    <div class="custom-player" style="margin-top: 25px; flex-direction:column; align-items:stretch; gap:10px; padding:20px;">
                        <div style="display:flex; align-items:center; gap:15px;">
                            <div class="play-circle">▶</div>
                            <div style="font-size:0.85rem; font-weight:bold;">Ouvir agora: ${ep.title}</div>
                        </div>
                        <div class="waveform-container active" id="wave-${ep.id}">
                            ${setTimeout(() => renderWaveform(`wave-${ep.id}`), 50) ? '' : ''}
                        </div>
                    </div>

                    <!-- WordPress Style Comments -->
                    <div class="comments-section" id="comments-${ep.id}">
                        <h4>💬 Comentários</h4>
                        <div class="comment-list" id="list-${ep.id}">
                            ${renderPostComments(ep.id)}
                        </div>
                        
                        <div id="comment-form" style="margin-top: 20px;">
                            <input type="text" id="name-${ep.id}" class="comment-input" placeholder="Seu nome" style="padding: 8px; margin-bottom: 5px;">
                            <textarea id="text-${ep.id}" class="comment-input" placeholder="O que você achou deste episódio?" rows="3" style="padding: 8px;"></textarea>
                            <button class="btn-action btn-primary" onclick="addComment(${ep.id})" style="width: 100%;">Enviar Comentário</button>
                        </div>
                    </div>
                </article>
            `).join('');
        }

        function renderGuests() {
            const grid = document.getElementById('public-guests');
            const guests = Database.guests();
            if (guests.length === 0) {
                grid.innerHTML = '<p style="grid-column: 1/-1; text-align:center; opacity:0.5;">Aguardando os primeiros convidados...</p>';
                return;
            }
            grid.innerHTML = guests.map(g => `
                <div class="guest-card">
                    <div class="guest-avatar">👤</div>
                    <h4>${g.name}</h4>
                    <p style="font-size: 0.8rem; line-height: 1.4; opacity: 0.7;">${g.bio}</p>
                </div>
            `).join('');
        }

        window.filterByCategory = (cat) => {
            currentCategory = cat;
            renderFilters();
            renderEpisodes();
        };

        window.filterEpisodes = () => renderEpisodes();

        window.renderPostComments = (epId) => {
            const comments = JSON.parse(localStorage.getItem(`comments_${epId}`)) || [];
            const approved = comments.filter(c => c.approved);
            if (approved.length === 0) return '<p style="opacity:0.5; font-size:0.8rem;">Aguardando o primeiro comentário aprovado!</p>';

            return approved.map(c => `
                <div class="comment-item">
                    <div class="comment-avatar">👤</div>
                    <div style="flex:1;">
                        <div class="comment-meta"><strong>${c.name}</strong> • ${c.date}</div>
                        <div style="font-size:0.95rem;">${c.text}</div>
                    </div>
                </div>
            `).join('');
        };

        window.addComment = (epId) => {
            const name = document.getElementById(`name-${epId}`).value.trim();
            const text = document.getElementById(`text-${epId}`).value.trim();
            if (!name || !text) { alert('Por favor, preencha nome e comentário!'); return; }

            const comments = JSON.parse(localStorage.getItem(`comments_${epId}`)) || [];
            comments.push({
                name,
                text,
                date: new Date().toLocaleDateString(),
                approved: false // Aguarda moderação
            });
            localStorage.setItem(`comments_${epId}`, JSON.stringify(comments));

            alert('Seu comentário foi enviado e agora aguarda aprovação do administrador! 😊');
            renderEpisodes();
        };

        window.subscribeNewsletter = () => {
            const email = document.getElementById('sub-email').value;
            if (!email || !email.includes('@')) { alert('Por favor, insira um e-mail válido!'); return; }
            const subs = JSON.parse(localStorage.getItem('super_cms_subs')) || [];
            if (subs.find(s => s.email === email)) { alert('E-mail já cadastrado!'); return; }

            subs.push({ email, date: new Date().toLocaleDateString() });
            localStorage.setItem('super_cms_subs', JSON.stringify(subs));
            alert('Parabéns! Você está inscrito e receberá novidades em breve. 🎉');
            document.getElementById('sub-email').value = '';
        };

        window.renderWaveform = (containerId) => {
            const container = document.getElementById(containerId);
            if (!container) return;
            container.innerHTML = Array(60).fill(0).map(() => {
                const h = Math.random() * 80 + 20;
                return `<div class="wave-bar" style="height:${h}%"></div>`;
            }).join('');
        };

        window.onload = initSite;
    </script>
</body>

</html>
